<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wing Lotties</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="carousel" id="carousel" aria-label="Wing animation carousel"></main>

    <nav class="navigator" aria-label="Animation navigator">
      <button class="nav-button" id="previous" type="button" aria-label="Previous animation">
        <span aria-hidden="true">&lsaquo;</span>
      </button>
      <div class="dots" id="dots" role="tablist" aria-label="Animations"></div>
      <button class="nav-button" id="next" type="button" aria-label="Next animation">
        <span aria-hidden="true">&rsaquo;</span>
      </button>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
